server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dorm-kiosk-server
  main:
    allow-bean-definition-overriding: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dorm_kiosk?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: org.zhangrui.model.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: dormKioskSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration
  expiration: 604800000
  header: Authorization
  prefix: "Bearer "

wechat:
  appid: your_wechat_appid
  appsecret: your_wechat_appsecret
  mchid: your_merchant_id
  serial-no: your_serial_no
  api-v3-key: your_api_v3_key
  notify-url: http://your-domain/api/order/notify

owner:
  activation-code: SHOP2024SECRET

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    org.zhangrui: DEBUG
    org.springframework.security: DEBUG
