server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: dorm-kiosk-server
  main:
    allow-bean-definition-overriding: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: org.zhangrui.model.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: dormKioskSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration
  expiration: 604800000
  header: Authorization
  prefix: "Bearer "

wechat:
  appid: your_wechat_appid
  appsecret: your_wechat_appsecret
  mchid: your_merchant_id
  serial-no: your_serial_no
  api-v3-key: your_api_v3_key
  notify-url: http://your-domain/api/order/notify

# 文件上传配置
file:
  upload-path: ./uploads/
  max-size: 10MB
